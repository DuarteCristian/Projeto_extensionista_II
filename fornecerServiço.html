<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>acheiPet</title>
    <link rel="stylesheet" href="styleAcheiPet.css">
</head>

<body>
    <button class="button" onclick="window.location.href='index.html'">EncontrePet</button>

    <div class="container">
        <div class="lado-esquerdo">
            <h1 class="welcome">Criar Anúncio do Pet</h1><br>
            <p class="P">Crie gratuitamente seu anúncio para acessar o Painel de Busca do pet.<br>
                Onde você poderá
                acessar
                ferramentas de divulgação com eficácia comprovada no Brasil inteiro.</p>
        </div>
        <div class="lado-direito">
            <div class="form-box">
                <h3>Adicione uma foto de seu pet</h3>
                <form id="formPet">

                    <select id="perdido">
                        <option value="encontrado">Encontrado</option>
                    </select>
                    <input type="text" id="descricao" placeholder="Descrição" required>
                    <input type="text" id="nome" placeholder="Possui alguma identificação?" required>
                    <input type="text" id="localizacao" placeholder="Onde foi encontrado?" required>
                    <input type="text" id="cidade" placeholder="Qual cidade é?" required>
                    <input type="text" id="genero" placeholder="Gênero" required>
                    <input type="text" id="contato" placeholder="Contato para quem encontrou" required>
                    <input type="file" id="foto" accept="image/*" required>
                    <button class="prosseguir" type="submit">Cadastrar</button>
                    <button class="cadastro" onclick="window.location.href='index.html'">Voltar</button>
                </form>
                <script>
                    document.getElementById("formPet").addEventListener("submit", function (e) {
                        e.preventDefault();
                        let situacao = document.getElementById("perdido").value;
                        let nome = document.getElementById("nome").value;
                        let descricao = document.getElementById("descricao").value;
                        let fotoInput = document.getElementById("foto");
                        let localizacao = document.getElementById("localizacao").value;
                        let cidade = document.getElementById("cidade").value;
                        let genero = document.getElementById("genero").value;
                        let contato = document.getElementById("contato").value;

                        let reader = new FileReader();

                        reader.onload = function () {
                            let fotoBase64 = reader.result;

                            let pet = {
                                id: Date.now(),
                                nome: nome,
                                situacao: situacao,
                                descricao: descricao,
                                foto: fotoBase64,
                                localizacao: localizacao,
                                cidade: cidade,
                                genero: genero,
                                contato: contato
                            };

                            // Pega lista existente ou cria nova
                            let lista = JSON.parse(localStorage.getItem("pets")) || [];
                            lista.push(pet);

                            localStorage.setItem("pets", JSON.stringify(lista));

                            alert("Pet cadastrado!");

                            // Redireciona para página principal
                            window.location.href = "index.html";
                        };

                        reader.readAsDataURL(fotoInput.files[0]);
                    });
                </script>


</body>

</html>
