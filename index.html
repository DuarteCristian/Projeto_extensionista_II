<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index</title>
    <link rel="stylesheet" href="styleIndex.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Poppins:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <button class="button" onclick="window.location.href='index.html'">FazTudo!</button>
    <!-- Botão -->
    <button class="menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars" style="color:white;"></i>☰</button>

    <!-- Overlay (fundo escuro) -->
    <div id="overlay" onclick="fecharMenu()"></div>
    <!-- Menu -->
    <div id="sidebar" class="sidebar">
        <a href="perfil.html">Perfil</a>
        <a href="sobreNos.html">Sobre Nós</a>
        <a href="login.html">Sair</a>
    </div>
    <p class="welcome">Precisando de uma mãozinha?</p>
    <p class="P">Encontre aqui a mão que vai solucionar seu problema</p>

    <button class="cadastro" onclick="window.location.href='buscarServiço.html'">
        <i class="fa-solid fa-magnifying-glass"></i>
        Buscar Serviços
    </button>
    <button class="cadastro" onclick="window.location.href='fornecerServiço.html'">
        <i class="fa-solid fa-magnifying-glass"></i>
        Fornecer Serviços
    </button>

    <br><br>
    <p class="welcome">Buscando Serviços</p>
    <div id="lista-cards"></div>
    <div class="carrossel">

        <button class="seta esquerda" onclick="rolarCards('Buscando', -300)">❮</button>

        <div id="lista-buscando"></div>
        <!-- seus cards aqui -->
        <button class="seta direita" onclick="rolarCards('Buscando', 300)">❯</button>
    </div>
    <p class="welcome">Serviços a disposição</p>
    <div class="carrossel">
        <button class="seta esquerda" onclick="rolarCards('Fornecer', -300)">❮</button>

        <div id="lista-servicos"></div>

        <button class="seta direita" onclick="rolarCards('Fornecer', 300)">❯</button>
    </div>




    </div>

    <script>
        function rolarCards(tipo, valor) {
            const container = document.getElementById(
                tipo === "Buscando" ? "lista-buscando" : "lista-servicos"
            );

            container.scrollBy({
                left: valor,
                behavior: "smooth"
            });
        }

        const buscando = JSON.parse(localStorage.getItem("Buscando")) || [];
        const fornecendo = JSON.parse(localStorage.getItem("Fornecer")) || [];

        let containerPerdidos = document.getElementById("lista-buscando");
        let containerEncontrados = document.getElementById("lista-servicos");

        [...buscando, ...fornecendo].forEach(serviço => {
            let card = document.createElement("div");
            card.classList.add("card");

            card.innerHTML = `
        <img src="${serviço.foto}" width="150">
        <p class="perdido">Situação: ${serviço.situacao}</p>
        <p>Nome: ${serviço.nome}</p>
        <p>Descrição: ${serviço.descricao}</p>
        <p>Cidade: ${serviço.cidade}</p>
        <p>Gênero: ${serviço.genero}</p>
        <p>Contato: ${serviço.contato}</p>
        <button class="btn-excluir">Excluir</button>
    `;

            // botão excluir
            card.querySelector(".btn-excluir").addEventListener("click", function () {
                let lista = JSON.parse(localStorage.getItem("Buscando")) || [];

                lista = lista.filter(p => p.id !== serviço.id);

                localStorage.setItem("Buscando", JSON.stringify(lista));

                card.remove();
            });


            if (serviço.situacao === "Buscando") {
                containerPerdidos.appendChild(card);
            } else {
                containerEncontrados.appendChild(card);
            }
        });

    </script>
    <script src="script.js"></script>


</body>

</html>
