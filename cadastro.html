<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cadastro</title>
    <link rel="stylesheet" href="styleCadastro.css">
</head>

<body>
    <div class="container">
        <div class="form-box">
            <h2>Cadastro</h2>

            <form id="cadastroForm" action="login.html">
                <input type="text" id="nome" placeholder="Nome completo" required>
                <input type="email" id="email" placeholder="E-mail" required>
                <input type="text" id="usuario" placeholder="Usuário" required>
                <input type="tel" id="telefone" placeholder="Telefone" required>
                <input type="text" id="endereco" placeholder="Endereço" required>
                <input type="password" id="senha" placeholder="Senha" required>
                <input type="password" id="confirmar-senha" placeholder="Confirmar senha" required>
                <button type="submit">Cadastrar</button>
            </form>
        </div>
    </div>
    <script>

        document.getElementById("cadastroForm")
            .addEventListener("submit", function (e) {

                e.preventDefault();

                const nome = document.getElementById("nome").value;
                const email = document.getElementById("email").value;
                const telefone = document.getElementById("telefone").value;
                const endereco = document.getElementById("endereco").value;

                localStorage.setItem("nomeUsuario", nome);
                localStorage.setItem("emailUsuario", email);
                localStorage.setItem("telefoneUsuario", telefone);
                localStorage.setItem("enderecoUsuario", endereco);

                window.location.href = "login.html";

            });

    </script>
</body>

</html>
